name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build WASM ──────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: make wasm
      - uses: actions/upload-artifact@v4
        with:
          name: polyhook-wasm
          path: polyhook.wasm
          retention-days: 1

  # ── Rust ────────────────────────────────────────────────────────────────────
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  # ── TypeScript ──────────────────────────────────────────────────────────────
  test-ts:
    name: Test TypeScript
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/sdk-ts/pnpm-lock.yaml
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-ts
      - run: pnpm install
        working-directory: packages/sdk-ts
      - run: pnpm test
        working-directory: packages/sdk-ts

  # ── Go ──────────────────────────────────────────────────────────────────────
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk-go/go.mod
          cache-dependency-path: packages/sdk-go/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-go
      - run: go test ./...
        working-directory: packages/sdk-go

  # ── Python ──────────────────────────────────────────────────────────────────
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-python/src/polyhook
      - run: uv sync
        working-directory: packages/sdk-python
      - run: uv run pytest
        working-directory: packages/sdk-python

  # ── .NET ────────────────────────────────────────────────────────────────────
  test-dotnet:
    name: Test .NET
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-dotnet
      - run: dotnet test packages/sdk-dotnet/PolyhookTests

  # ── Spell check ─────────────────────────────────────────────────────────────
  spell:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g cspell
      - run: cspell "**" --no-progress
