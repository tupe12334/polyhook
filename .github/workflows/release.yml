name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # create GitHub Release + push Go submodule tag

jobs:
  # ── Build WASM ──────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: make wasm
      - uses: actions/upload-artifact@v4
        with:
          name: polyhook-wasm
          path: polyhook.wasm
          retention-days: 1

  # ── npm (@polyhook/sdk → npmjs.com) ─────────────────────────────────────────
  # Required secret: NPM_TOKEN
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: packages/sdk-ts/pnpm-lock.yaml
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-ts
      - run: pnpm install
        working-directory: packages/sdk-ts
      - name: Set version
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        working-directory: packages/sdk-ts
      - run: pnpm build
        working-directory: packages/sdk-ts
      - run: pnpm publish --no-git-checks --access public
        working-directory: packages/sdk-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── crates.io (polyhook-core + polyhook) ────────────────────────────────────
  # Required secret: CRATES_IO_TOKEN
  # Note: sdk-rust uses a path dep on polyhook-core; we publish core first,
  # wait for indexing, then patch the dep and publish the SDK.
  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Set version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" core/Cargo.toml
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" packages/sdk-rust/Cargo.toml
          sed -i "s|polyhook-core = { path = \"../../core\" }|polyhook-core = { version = \"$VERSION\" }|" \
            packages/sdk-rust/Cargo.toml
      - name: Publish polyhook-core
        run: cargo publish -p polyhook-core --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty
      - name: Wait for crates.io to index polyhook-core
        run: sleep 30
      - name: Publish polyhook (sdk-rust)
        run: cargo publish -p polyhook --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty

  # ── PyPI (polyhook) ──────────────────────────────────────────────────────────
  # Required secret: PYPI_TOKEN
  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-python/src/polyhook
      - name: Set version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" pyproject.toml
        working-directory: packages/sdk-python
      - run: uv build
        working-directory: packages/sdk-python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist
          password: ${{ secrets.PYPI_TOKEN }}

  # ── NuGet (Polyhook.Sdk) ─────────────────────────────────────────────────────
  # Required secret: NUGET_API_KEY
  publish-nuget:
    name: Publish NuGet
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
          path: packages/sdk-dotnet
      - name: Set version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|<Version>[^<]*</Version>|<Version>$VERSION</Version>|" Polyhook.Sdk.csproj
        working-directory: packages/sdk-dotnet
      - run: dotnet pack -c Release
        working-directory: packages/sdk-dotnet
      - run: >
          dotnet nuget push bin/Release/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
        working-directory: packages/sdk-dotnet

  # ── GitHub Release + Go submodule tag ───────────────────────────────────────
  # Creates the release and attaches polyhook.wasm as a binary asset.
  # Also pushes packages/sdk-go/<tag> required by the Go module proxy for
  # github.com/tupe12334/polyhook/packages/sdk-go (subdirectory module).
  # Runs even if individual publish jobs fail — as long as wasm built.
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wasm, publish-npm, publish-crates, publish-pypi, publish-nuget]
    if: always() && needs.build-wasm.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: polyhook-wasm
      - name: Tag Go submodule
        run: |
          git tag "packages/sdk-go/${GITHUB_REF_NAME}"
          git push origin "packages/sdk-go/${GITHUB_REF_NAME}"
      - uses: softprops/action-gh-release@v2
        with:
          files: polyhook.wasm
          generate_release_notes: true
